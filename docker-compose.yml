services:
  # ---- DATA LAKE STORAGE ----
  minio:
    image: minio/minio:latest
    container_name: de_project_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: securepassword123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ---- DATA WAREHOUSE ----
  postgres:
    image: postgres:15-alpine
    container_name: de_project_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_password
      POSTGRES_DB: job_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # ---- ORCHESTRATION ENGINE ----
  airflow-init:
    build: .
    container_name: de_project_airflow_init
    user: "0:0"
    volumes:
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/dags:/opt/airflow/dags
      - ./scripts/docker-airflow-init.sh:/docker-airflow-init.sh:ro
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://warehouse_user:warehouse_password@postgres:5432/job_analytics
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=securepassword123
      - MINIO_BUCKET_NAME=raw-job-payloads
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=job_analytics
      - POSTGRES_USER=warehouse_user
      - POSTGRES_PASSWORD=warehouse_password
    command: bash /docker-airflow-init.sh
    depends_on:
      - postgres

  airflow-webserver:
    build: .
    container_name: de_project_airflow_webserver
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://warehouse_user:warehouse_password@postgres:5432/job_analytics
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=securepassword123
      - MINIO_BUCKET_NAME=raw-job-payloads
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=job_analytics
      - POSTGRES_USER=warehouse_user
      - POSTGRES_PASSWORD=warehouse_password
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - .:/opt/airflow/project_root
    command: bash -c "airflow webserver"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
      postgres:
        condition: service_started

  airflow-scheduler:
    build: .
    container_name: de_project_airflow_scheduler
    restart: always
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://warehouse_user:warehouse_password@postgres:5432/job_analytics
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=securepassword123
      - MINIO_BUCKET_NAME=raw-job-payloads
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=job_analytics
      - POSTGRES_USER=warehouse_user
      - POSTGRES_PASSWORD=warehouse_password
      - PYTHONPATH=/opt/airflow/project_root
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - .:/opt/airflow/project_root
    command: bash -c "airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
      postgres:
        condition: service_started

  discord-bot:
    build:
      context: ./discord_bot
      dockerfile: Dockerfile
    container_name: de_project_discord_bot
    restart: always
    depends_on:
      airflow-webserver:
        condition: service_healthy
    volumes:
      - ./discord_bot:/app
    env_file:
      - .env
    environment:
      - AIRFLOW_API_URL=http://airflow-webserver:8080/api/v1/dags/auto_data_pipeline/dagRuns

volumes:
  minio_data:
  postgres_data:

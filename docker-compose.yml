services:
  # ---- DATA LAKE STORAGE ----
  minio:
    image: minio/minio:latest
    container_name: de_project_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: securepassword123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ---- DATA WAREHOUSE ----
  postgres:
    image: postgres:15-alpine
    container_name: de_project_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_password
      POSTGRES_DB: job_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # ---- ORCHESTRATION ENGINE ----
  airflow-init:
    build: .
    container_name: de_project_airflow_init
    user: "0:0"
    volumes:
      - ./airflow/logs:/opt/airflow/logs
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://warehouse_user:warehouse_password@postgres:5432/job_analytics
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=securepassword123
      - MINIO_BUCKET_NAME=raw-job-payloads
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=job_analytics
      - POSTGRES_USER=warehouse_user
      - POSTGRES_PASSWORD=warehouse_password
    command: >
      bash -c "mkdir -p /opt/airflow/logs &&
      chown -R 50000:0 /opt/airflow/logs &&
      runuser -u airflow -- airflow db migrate &&
      runuser -u airflow -- airflow users create
      --username admin --password admin --firstname Admin --lastname User
      --role Admin --email admin@example.com || true"
    depends_on:
      - postgres

  airflow-webserver:
    build: .
    container_name: de_project_airflow_webserver
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://warehouse_user:warehouse_password@postgres:5432/job_analytics
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=securepassword123
      - MINIO_BUCKET_NAME=raw-job-payloads
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=job_analytics
      - POSTGRES_USER=warehouse_user
      - POSTGRES_PASSWORD=warehouse_password
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - .:/opt/airflow/project_root
    # STANDARD: Use explicit bash invocation to pass the command smoothly
    command: bash -c "airflow webserver"
    depends_on:
      - minio
      - postgres

  airflow-scheduler:
    build: .
    container_name: de_project_airflow_scheduler
    restart: always
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://warehouse_user:warehouse_password@postgres:5432/job_analytics
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=securepassword123
      - MINIO_BUCKET_NAME=raw-job-payloads
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=job_analytics
      - POSTGRES_USER=warehouse_user
      - POSTGRES_PASSWORD=warehouse_password
      - PYTHONPATH=/opt/airflow/project_root
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - .:/opt/airflow/project_root
    # STANDARD: Use explicit bash invocation to pass the command smoothly
    command: bash -c "airflow scheduler"
    depends_on:
      - minio
      - postgres
      
  discord-bot:
    build:
      context: ./discord_bot
      dockerfile: Dockerfile
    container_name: de_project_discord_bot
    restart: always
    # Ensure Airflow is up before starting the bot
    depends_on:
      - airflow-webserver
    volumes:
      - ./discord_bot:/app
    env_file:
      - .env
    environment:
      - AIRFLOW_API_URL=http://airflow-webserver:8080/api/v1/dags/auto_data_pipeline/dagRuns
      
volumes:
  minio_data:
  postgres_data:
